name: Build Windows (Dev)

on:
  workflow_dispatch:

jobs:
  build-windows-dev:
    name: Build Windows App (Development)
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Windows app (dev mode)
        shell: bash
        run: |
          echo "Building Windows app in development mode..."
          cd src-tauri
          cargo tauri build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APTABASE_APP_KEY: ${{ vars.APTABASE_APP_KEY }}
          SENTRY_DSN: ${{ vars.SENTRY_DSN }}
          SENTRY_ENVIRONMENT: development

      - name: Upload Windows installer (msi)
        uses: actions/upload-artifact@v4
        with:
          name: livicat-windows-dev-msi
          path: src-tauri/target/release/bundle/msi/*.msi
          retention-days: 30

      - name: Upload Windows installer (exe)
        uses: actions/upload-artifact@v4
        with:
          name: livicat-windows-dev-exe
          path: src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 30
