name: Build Electron Apps

on:
  push:
    branches:
      - 'release/**'
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create GitHub Release'
        required: false
        type: boolean
        default: true

env:
  RELEASE_BRANCH_PREFIX: 'release/'

jobs:
  setup:
    name: Setup Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      should_release: ${{ steps.check_release.outputs.should_release }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Get version from package.json
        id: get_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"
      
      - name: Check if should create release
        id: check_release
        run: |
          SHOULD_RELEASE="false"
          if [[ "${{ github.ref }}" == refs/tags/v* ]] || [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.event.inputs.create_release }}" == "true" ]] || [[ "${{ github.ref }}" == refs/heads/release/* ]]; then
            SHOULD_RELEASE="true"
          fi
          echo "should_release=$SHOULD_RELEASE" >> $GITHUB_OUTPUT
          echo "Should create release: $SHOULD_RELEASE"

  build-mac:
    name: Build macOS App
    runs-on: macos-latest
    needs: setup
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build production bundle
        run: npm run build
      
      - name: Build macOS app
        run: npm run electron:build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: livicat-macos
          path: release/*.dmg
          retention-days: 30
      
      - name: Create Release (if needed)
        if: needs.setup.outputs.should_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.setup.outputs.version }}
          name: Livicat v${{ needs.setup.outputs.version }}
          files: release/*.dmg
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## 🎉 Livicat v${{ needs.setup.outputs.version }}
            
            ### Downloads
            - **macOS (Intel)**: `Livicat-${{ needs.setup.outputs.version }}.dmg`
            - **macOS (Apple Silicon)**: `Livicat-${{ needs.setup.outputs.version }}-arm64.dmg`
            - **Windows**: `Livicat Setup ${{ needs.setup.outputs.version }}.exe`
            
            ### What's New
            
            See the [commit history](https://github.com/kg20dev/livicat/commits/main) for details.
            
            ### Installation
            
            **macOS**:
            1. Download the appropriate `.dmg` file
            2. Open and drag Livicat to Applications
            3. Launch from Applications folder
            
            **Windows**:
            1. Download the `.exe` installer
            2. Run the installer
            3. Launch from Start Menu
            
            ### 📚 Documentation
            
            For usage instructions, see the [README](https://github.com/kg20dev/livicat#readme)
            
            ---
            **Made with ❤️ for streamers**

  build-windows:
    name: Build Windows App
    runs-on: windows-latest
    needs: setup
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build production bundle
        run: npm run build
      
      - name: Build Windows app
        run: npm run electron:build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: livicat-windows
          path: release/*.exe
          retention-days: 30
      
      - name: Create Release (if needed)
        if: needs.setup.outputs.should_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.setup.outputs.version }}
          name: Livicat v${{ needs.setup.outputs.version }}
          files: release/*.exe
          draft: false
          prerelease: false
          generate_release_notes: false
          body: |
            Windows installer has been added to the release. See macOS job for full release notes.
