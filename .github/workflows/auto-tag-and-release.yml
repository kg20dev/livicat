name: Auto Tag and Release

on:
  pull_request:
    types:
      - closed
    branches:
      - 'release/**'

permissions:
  contents: write

jobs:
  auto-tag-and-release:
    if: github.event.pull_request.merged == true && github.event.pull_request.base_ref == 'release/app'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from package.json
        id: get_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Check if tag exists
        id: check_tag
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          if git rev-parse "refs/tags/v$VERSION" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag v$VERSION already exists"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Tag v$VERSION does not exist, will create"
          fi

      - name: Create and push tag
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v$VERSION" -m "Release v$VERSION" -m "Automated tag from main → release/app merge"
          git push origin "v$VERSION"
          echo "✅ Created and pushed tag v$VERSION"

      - name: Trigger release workflow
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          echo "🚀 Triggering release workflow for v$VERSION"
          echo "The build-tauri.yml workflow will detect the new tag and build the release"
