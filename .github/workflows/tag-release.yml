name: Tag Release
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  prepare-release:
    name: Prepare Release PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      pr_number: ${{ steps.create-pr.outputs.pull-request-number }}
      pr_url: ${{ steps.create-pr.outputs.pull-request-url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Extract version from tag
        id: version
        run: |
          TAG=${GITHUB_REF_NAME#v}
          echo "version=$TAG" >> $GITHUB_OUTPUT

      - name: Sync version from tag
        run: |
          VERSION=${{ steps.version.outputs.version }}
          npm version $VERSION --no-git-tag-version
          node scripts/sync-version.cjs

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Get previous tag
        id: prev_tag
        run: |
          PREV_TAG=$(git tag --sort=-version:refname -l "v*" | grep -v "^${GITHUB_REF_NAME}$" | head -1)
          echo "tag=$PREV_TAG" >> $GITHUB_OUTPUT
          echo "Previous tag: ${PREV_TAG:-none}"

      - name: Generate changelog
        if: steps.prev_tag.outputs.tag != ''
        id: changelog
        uses: mikepenz/release-changelog-builder-action@v4
        with:
          configuration: |
            {
              "categories": [
                {"title": "🚀 Features", "labels": ["feature", "feat"]},
                {"title": "🐛 Bug Fixes", "labels": ["bug", "fix"]},
                {"title": "📝 Documentation", "labels": ["documentation", "docs"]},
                {"title": "🔧 Maintenance", "labels": ["maintenance", "chore", "refactor"]},
                {"title": "⚡ Performance", "labels": ["performance", "perf"]},
                {"title": "🧪 Tests", "labels": ["test", "tests"]}
              ],
              "template": "# {{CHANGELOG}}\n\n{{CATEGORIES}}",
              "categoryTemplate": "## {{TITLE}}\n{{ITEMS}}\n",
              "itemTemplate": "- {{COMMIT_MESSAGE}} ([#{{ISSUE_NUMBER}}]({{ISSUE_URL}})) ({{AUTHOR}})",
              "maxIssues": 50
            }
          fromTag: ${{ steps.prev_tag.outputs.tag }}
          toTag: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json src-tauri/Cargo.toml src-tauri/tauri.conf.json
          git commit -m "Bump version to ${{ steps.version.outputs.version }}"

      - name: Save changelog
        if: steps.prev_tag.outputs.tag != ''
        run: |
          cat > /tmp/changelog.md << 'C4NG3L0G'
          ${{ steps.changelog.outputs.changelog }}
          C4NG3L0G

      - name: Create Release PR
        id: create-pr
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BRANCH="rel/v$VERSION"
          git push origin "HEAD:refs/heads/$BRANCH"

          # Build PR body
          echo "## Release v$VERSION" > /tmp/pr-body.md
          echo "" >> /tmp/pr-body.md
          echo "Auto-generated release PR from tag push." >> /tmp/pr-body.md
          echo "" >> /tmp/pr-body.md
          echo "### 📋 Changes" >> /tmp/pr-body.md
          if [ -s /tmp/changelog.md ]; then
            cat /tmp/changelog.md >> /tmp/pr-body.md
          else
            echo "No changelog (first release or no previous tag)." >> /tmp/pr-body.md
          fi
          echo "" >> /tmp/pr-body.md
          echo "---" >> /tmp/pr-body.md
          echo "" >> /tmp/pr-body.md
          echo "### ✅ Checklist" >> /tmp/pr-body.md
          echo "- [ ] CI checks pass" >> /tmp/pr-body.md
          echo "- [ ] Version matches tag: $VERSION" >> /tmp/pr-body.md
          echo "- [ ] Changelog reviewed" >> /tmp/pr-body.md
          echo "- [ ] Merge manually when ready" >> /tmp/pr-body.md

          PR_URL=$(gh pr create \
            --base release/app \
            --head "$BRANCH" \
            --title "[$VERSION] Release v$VERSION" \
            --body-file /tmp/pr-body.md \
            --label "release,automated")
          echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT
          echo "pr_number=${PR_URL##*/}" >> $GITHUB_OUTPUT

  # After you merge this PR to release/app:
  #   - build-tauri.yml builds macOS + Windows and creates the release
  #   - auto-tag-and-release.yml creates the tag (skipped if already exists)
