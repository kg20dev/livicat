name: Build Tauri App

on:
  push:
    branches:
      - 'release/**'
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create GitHub Release'
        required: false
        type: boolean
        default: true

permissions:
  contents: write

env:
  RELEASE_BRANCH_PREFIX: 'release/'

jobs:
  setup:
    name: Setup Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      should_release: ${{ steps.check_release.outputs.should_release }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from package.json
        id: get_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Check if should create release
        id: check_release
        run: |
          SHOULD_RELEASE="false"
          if [[ "${{ github.ref }}" == refs/tags/v* ]] || [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.event.inputs.create_release }}" == "true" ]] || [[ "${{ github.ref }}" == refs/heads/release/* ]]; then
            SHOULD_RELEASE="true"
          fi
          echo "should_release=$SHOULD_RELEASE" >> $GITHUB_OUTPUT
          echo "Should create release: $SHOULD_RELEASE"

  build-mac:
    name: Build macOS App
    runs-on: macos-latest
    needs: setup

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Get version from Cargo.toml
        id: cargo-version
        run: |
          VERSION=$(node .github/scripts/get-cargo-version.js)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Cargo version: $VERSION"

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: ${{ steps.cargo-version.outputs.version }}

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build

      - name: Build macOS app (Apple Silicon)
        run: npm run tauri:build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: livicat-macos
          path: |
            src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app
          retention-days: 30

  build-windows:
    name: Build Windows App
    runs-on: windows-latest
    needs: setup

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Get version from Cargo.toml
        id: cargo-version
        run: |
          VERSION=$(node .github/scripts/get-cargo-version.js)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Cargo version: $VERSION"

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: ${{ steps.cargo-version.outputs.version }}

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build

      - name: Build Windows app
        run: npm run tauri build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: livicat-windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 30

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [setup, build-mac, build-windows]
    if: needs.setup.outputs.should_release == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: livicat-macos
          path: artifacts/macos
          pattern: '*.dmg'
          merge-multiple: true

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: livicat-windows
          path: artifacts/windows
          pattern: '*.{exe,msi}'
          merge-multiple: true

      - name: List downloaded files
        run: |
          echo "MacOS files:"
          ls -la artifacts/macos/ || echo "No macOS files"
          echo "Windows files:"
          ls -la artifacts/windows/ || echo "No Windows files"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.setup.outputs.version }}
          name: Livicat v${{ needs.setup.outputs.version }}
          files: |
            artifacts/macos/dmg/*.dmg
            artifacts/macos/macos/*.app
            artifacts/windows/nsis/*.exe
            artifacts/windows/msi/*.msi
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## 🎉 Livicat v${{ needs.setup.outputs.version }}

            ### Downloads
            - **macOS (Apple Silicon)**: `Livicat_${{ needs.setup.outputs.version }}_aarch64.dmg`
            - **Windows (x64)**: `Livicat_${{ needs.setup.outputs.version }}_x64-setup.exe` or `Livicat_${{ needs.setup.outputs.version }}_x64.msi`

            ### What's New

            See the [commit history](https://github.com/kg20dev/livicat/commits/main) for details.

            ### Installation

            **macOS**:
            1. Download the appropriate `.dmg` file
            2. Open and drag Livicat to Applications
            3. Launch from Applications folder

            **Windows**:
            1. Download the `.exe` installer or `.msi` package
            2. Run the installer
            3. Launch Livicat from Start Menu

            ### 📚 Documentation

            For usage instructions, see the [README](https://github.com/kg20dev/livicat#readme)

            ---
            **Made with ❤️ for streamers**
