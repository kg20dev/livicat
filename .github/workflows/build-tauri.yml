name: Build Tauri App

on:
  push:
    branches:
      - 'release/**'
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create GitHub Release'
        required: false
        type: boolean
        default: true

env:
  RELEASE_BRANCH_PREFIX: 'release/'

permissions:
  contents: write

jobs:
  setup:
    name: Setup & Validation
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      should_release: ${{ steps.check_release.outputs.should_release }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from package.json
        id: get_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Check if should create release
        id: check_release
        run: |
          SHOULD_RELEASE="false"
          if [[ "${{ github.ref }}" == refs/tags/v* ]] || [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.event.inputs.create_release }}" == "true" ]] || [[ "${{ github.ref }}" == refs/heads/release/* ]]; then
            SHOULD_RELEASE="true"
          fi
          echo "should_release=$SHOULD_RELEASE" >> $GITHUB_OUTPUT
          echo "Should create release: $SHOULD_RELEASE"

      - name: Validate Aptabase Analytics Key
        run: |
          echo "Checking Aptabase configuration..."
          if [ -z "${{ vars.APTABASE_APP_KEY }}" ]; then
            echo "❌ ERROR: APTABASE_APP_KEY environment variable not set!"
            echo "Analytics is required for production builds."
            echo ""
            echo "To fix this:"
            echo "1. Go to: https://github.com/kg20dev/livicat/settings/variables"
            echo "2. Click 'New repository variable'"
            echo "3. Name: APTABASE_APP_KEY"
            echo "4. Value: Your Aptabase App Key from https://us.aptabase.com"
            echo "5. Select Environment: release/** (or All)"
            echo "6. Save and retry"
            exit 1
          fi
          echo "✅ Aptabase key is configured"

  build-app:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: setup

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build

      - name: Upload frontend build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: livicat-frontend
          path: dist/
          retention-days: 1

  build-mac:
    name: Build macOS App
    runs-on: macos-latest
    needs: [setup, build-app]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true

      - name: Install dependencies
        run: npm ci

      - name: Download frontend build artifacts
        uses: actions/download-artifact@v4
        with:
          name: livicat-frontend
          path: dist

      - name: Verify frontend artifacts
        run: |
          echo "Verifying pre-built frontend..."
          if [ ! -d "dist" ] || [ -z "$(ls -A dist 2>/dev/null)" ]; then
            echo "❌ ERROR: Frontend artifacts not found!"
            echo "Expected dist/ directory from build-app job"
            exit 1
          fi
          echo "✅ Frontend artifacts found:"
          ls -lh dist/

      - name: Build macOS app (Apple Silicon)
        run: |
          echo "Building macOS app with pre-built frontend..."
          echo "Tauri will use existing dist/ directory without rebuilding"
          cd src-tauri
          cargo tauri build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APTABASE_APP_KEY: ${{ vars.APTABASE_APP_KEY }}

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: livicat-macos
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app
          retention-days: 30

  build-windows:
    name: Build Windows App
    runs-on: windows-latest
    needs: [setup, build-app]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true

      - name: Cache WiX binaries (Windows installer tool)
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\Temp\wix314-binaries
          key: wix314-${{ runner.os }}-v1

      - name: Install dependencies
        run: npm ci

      - name: Download frontend build artifacts
        uses: actions/download-artifact@v4
        with:
          name: livicat-frontend
          path: dist

      - name: Verify frontend artifacts
        shell: bash
        run: |
          echo "Verifying pre-built frontend..."
          if [ ! -d "dist" ] || [ -z "$(ls -A dist 2>/dev/null)" ]; then
            echo "❌ ERROR: Frontend artifacts not found!"
            echo "Expected dist/ directory from build-app job"
            exit 1
          fi
          echo "✅ Frontend artifacts found:"
          ls -lh dist/

      - name: Clean Rust build cache (ensure fresh artifacts)
        shell: bash
        run: cd src-tauri && cargo clean

      - name: Build Windows app
        shell: bash
        run: |
          echo "Building Windows app with pre-built frontend..."
          echo "Tauri will use existing dist/ directory without rebuilding"
          cd src-tauri
          cargo tauri build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APTABASE_APP_KEY: ${{ vars.APTABASE_APP_KEY }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: livicat-windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 30

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [setup, build-mac, build-windows]
    if: needs.setup.outputs.should_release == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: livicat-macos
          path: artifacts/macos

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: livicat-windows
          path: artifacts/windows

      - name: Debug artifact structure
        run: |
          echo "macOS artifacts:"
          find artifacts/macos -type f
          echo ""
          echo "Windows artifacts:"
          find artifacts/windows -type f

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.setup.outputs.version }}
          name: Livicat v${{ needs.setup.outputs.version }}
          files: |
            artifacts/macos/dmg/*.dmg
            artifacts/windows/msi/*.msi
            artifacts/windows/nsis/*.exe
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## 🎉 Livicat v${{ needs.setup.outputs.version }}

            ### Downloads
            - **macOS (Apple Silicon)**: `Livicat_${{ needs.setup.outputs.version }}_aarch64.dmg`
            - **Windows (x64)**: `Livicat_${{ needs.setup.outputs.version }}_x64-setup.exe` or `Livicat_${{ needs.setup.outputs.version }}_x64.msi`

            ### What's New

            See the [commit history](https://github.com/kg20dev/livicat/commits/main) for details.

            ### Installation

            **macOS**:
            1. Download the appropriate `.dmg` file
            2. Open and drag Livicat to Applications
            3. Launch from Applications folder

            **Windows**:
            1. Download the `.exe` installer or `.msi` package
            2. Run the installer
            3. Launch Livicat from Start Menu

            ### 📚 Documentation

            For usage instructions, see the [README](https://github.com/kg20dev/livicat#readme)

            ---
            **Made with ❤️ for streamers**
