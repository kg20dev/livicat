name: Bug Report
description: Report a bug to help us improve Livicat
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report! Please provide as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: Describe the Bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Open Livicat
        2. Enter a YouTube URL and click "Fetch"
        3. Click "Live Chat" button
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen instead?
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Logs
      description: If applicable, add screenshots, console logs, or error messages to help explain the problem.
      placeholder: Paste screenshots, terminal output, or Sentry event IDs here

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      description: Which operating system are you using?
      options:
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Windows 10
        - Windows 11
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: App Version
      description: What version of Livicat are you running?
      placeholder: e.g. 0.7.7 (check via Settings → About or the GitHub Releases page)
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any other context about the problem here (e.g. OBS version, YouTube video type, recent changes).
